name: Release Main

on:
  push:
    branches: [main]

jobs:
  android-release:
    runs-on: ubuntu-latest
    environment: production
    env:
      KAKAO_APP_KEY: ${{ secrets.KAKAO_APP_KEY }}
      BASE_URL: ${{ secrets.BASE_URL }}
      AMPLITUDE_KEY: ${{ secrets.AMPLITUDE_KEY }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android-release.jks

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Ruby debug
        run: |
          ruby -v
          bundle -v
          bundle env
          bundle exec fastlane --version

      - name: Create temp directory
        run: mkdir -p fastlane_tmp
      
      - name: Restore Android service account
        env:
          ANDROID_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          echo "$ANDROID_SERVICE_ACCOUNT_JSON_BASE64" | base64 --decode > fastlane_tmp/android_service_account.json

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > composeApp/google-services.json

      - name: Restore Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"

      - name: Deploy Android internal
        run: bundle exec fastlane android deploy_internal --verbose

  ios-release:
    runs-on: macos-26
    environment: production
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
      IOS_DISTRIBUTION_P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
      MATCH_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: List Xcode apps
        run: ls /Applications | grep Xcode

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Verify Xcode
        run: |
          xcodebuild -version
          swift --version

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Ruby debug
        run: |
          ruby -v
          bundle -v
          bundle env
          bundle exec fastlane --version

      - name: Create temp directory
        run: mkdir -p fastlane_tmp

      - name: Restore iOS distribution certificate
        env:
          IOS_DISTRIBUTION_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}
        run: |
          echo "$IOS_DISTRIBUTION_P12_BASE64" | base64 --decode > fastlane_tmp/ondot_distribution.p12

      - name: Restore app provisioning profile
        env:
          IOS_APP_PROFILE_BASE64: ${{ secrets.IOS_APP_PROFILE_BASE64 }}
        run: |
          echo "$IOS_APP_PROFILE_BASE64" | base64 --decode > fastlane_tmp/OnDot_AppStore.mobileprovision

      - name: Restore widget provisioning profile
        env:
          IOS_WIDGET_PROFILE_BASE64: ${{ secrets.IOS_WIDGET_PROFILE_BASE64 }}
        run: |
          echo "$IOS_WIDGET_PROFILE_BASE64" | base64 --decode > fastlane_tmp/OnDotAlarmWidget_AppStore.mobileprovision

      - name: Deploy iOS TestFlight
        run: bundle exec fastlane ios deploy_testflight --verbose

      - name: Print gym log on failure
        if: failure()
        run: |
          echo "===== gym log ====="
          cat /Users/runner/Library/Logs/gym/OnDot-iosApp.log || true
