name: CI

on:
  pull_request:
    branches: [develop]

jobs:
  android-ci:
    runs-on: ubuntu-latest
    env:
      KAKAO_APP_KEY: ${{ secrets.KAKAO_APP_KEY }}
      BASE_URL: ${{ secrets.BASE_URL }}
      AMPLITUDE_KEY: ${{ secrets.AMPLITUDE_KEY }}
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > composeApp/google-services.json
        
      - name: Android CI
        run: |
          ./gradlew :feature:main:testDebugUnitTest :composeApp:bundleRelease --stacktrace
