name: CI

on:
  pull_request:
    branches: [develop]

jobs:
  android-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > composeApp/google-services.json
      
      - name: Run unit tests
        env:
          KAKAO_APP_KEY: ${{ secrets.KAKAO_APP_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          AMPLITUDE_KEY: ${{ secrets.AMPLITUDE_KEY }}
        run: ./gradlew test

      - name: Build Android release bundle
        env:
          KAKAO_APP_KEY: ${{ secrets.KAKAO_APP_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          AMPLITUDE_KEY: ${{ secrets.AMPLITUDE_KEY }}
        run: ./gradlew :composeApp:bundleRelease

  ios-ci:
    runs-on: macos-latest
    env:
      KAKAO_APP_KEY: ${{ secrets.KAKAO_APP_KEY }}
      BASE_URL: ${{ secrets.BASE_URL }}
      AMPLITUDE_KEY: ${{ secrets.AMPLITUDE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Verify selected Xcode
        run: |
          xcodebuild -version
          swift --version

      - name: Build iOS without signing
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            build | tee xcodebuild.log
